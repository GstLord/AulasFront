!<!DOCTAPE html>
<html lang="pt-BR>
<head>
    <meta charset="UTF-8">
    <title> CAIXA LIVRE </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        /*quando inicia com ponto sera para puxar uma classe*/
        .topo {
        background: #ffc107;
        text-align: center; /*alinha texto no centro*/ 
        font-size: 43px;
        font-weight: bold;
        border: 2px; solid: #000; /*grossura da borda*/    
                
        }
        .painel {
        background: #aaa;
		padding: 10px;
		margin-bottom: 15px;
        border: 2px solid #000;
        justify-content: right;
}
        .total {
        font-size: 32px;
        text-align: center;
        font-weight: bold;
}
    </style>
 </head>

<body class="bg-primary bg-gradient">
         <div class="container mt-3">
       
            <div class="topo"> CAIXA LIVRE </div>
          
            <div class="row mt-3">
                    
                      <div class="col-md-7">
                          
                        <h3 class="text-white"> <span class=badge text-bg-prymari"> Sua Compra </span></h3>
                        <ul id="lista" class="list-group lista"> </ul>                       

                      </div>
                         
                       <div class="col-md-5">
                           <div class="painel">
				Total: R$ <span class="total">0.00</span>
                           </div>

                            <div class="painel">
                            <label> Código de Barras </label>
                            <input type="text" id="cod" class"form-control">
                            </div>

                            <div class="painel">
                            <label> Quantidade </label>
                            <input type="number" id="qtd" class"form-control" value = "1"></input>
                            
                            </div>

                           <div class="painel">
				Sub-total: R$ <span id="sub">0.00</span>
                           </div>

                           <button class="btn btn-sucess w-100" onclick="addProduto()">
                                   Adicionar Produto
                           </button>
                       </div>
                       </div>
             </div>
             <script src = "mercado.js"></script>
               
</div>
</body>
</html>
